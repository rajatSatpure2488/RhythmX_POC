# ============================================
# MediSync — Docker Compose
# Full-stack: FastAPI Backend + React Frontend
# ============================================
#
# Usage:
#   Development:  docker compose up --build
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#   Tests only:   docker compose run --rm backend-test
#
# ============================================

services:

  # ── FastAPI Backend ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./requirements.txt:/app/requirements.txt
      - ./.env:/app/.env:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - medisync-net

  # ── React Frontend (Dev Mode) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: medisync-frontend
    ports:
      - "8501:8501"
    environment:
      # Vite proxy target — backend reachable via service name on docker-compose network.
      # Falls back to http://localhost:8000 when running `npm run dev` on the host.
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medisync-net

  # ── Test Runner (on-demand) ────────────────
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync-tests
    volumes:
      - ./backend:/app
      - ./requirements.txt:/app/requirements.txt
    environment:
      - PYTHONPATH=/app
    command: python -m pytest tests/ -v --tb=short
    profiles:
      - test
    networks:
      - medisync-net

networks:
  medisync-net:
    driver: bridge
